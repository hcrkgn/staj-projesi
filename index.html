<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kişisel Kitaplık</title>
</head>
<body>

   <header>
    <h1>Kişisel Kitaplık</h1>
</header> 

<main>

<section>

    <h2>Kitap Ekle</h2>

<form>
    <label for="kitapAdi">Kitap Adı</label>
    <input type="text" id="kitapAdi">

    <label for="yazar">Yazar</label>
    <input type="text" id="yazar">

    <label>Yayın yılı</label>
    <input type="number">

    <label>Tür</label>
<select>
    <option>Roman</option>

<option>Bilim</option>

<option>Tarih</option>

<option>Fantastik</option>
</select>

   <label>Durum</label>
<select>
<option>Okundu</option>
<option>Okunuyor</option>
<option>okunacak</option>
</select>

<button type="submit">Ekle</button>

<form id="kitapForm">

<section>

<h2>Kitap Listesi</h2>

<table>
<tr>

<th>Kitap Adı</th>

<th>Yazar</th>

<th>Yıl</th>

<th>Tür</th>

<th>Durum</th>

</tr>
</table>

</section>

</section>

</main>

</body>
</html>
