<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="container">

    <h2>Library System</h2>

    <form id="loginForm">

        <input
            type="text"
            id="username"
            placeholder="Username"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
            required
        >

        <button type="submit">Login</button>

    </form>

    <p id="message"></p>

    <p>
        Don't have an account?
        <a href="register.html">Register</a>
    </p>

</div>

<script src="login.js"></script>

</body>
</html>
